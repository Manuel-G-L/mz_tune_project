<div class="enquire-wrapper">
  <div class="container">

    <!-- Header y descripción -->
    <div class="section-header text-center mb-5">
      <h1 class="display-4 fw-bold tracking-widest">TECHNICAL ENQUIRY</h1>
      <div class="accent-line mx-auto"></div>
      <p class="text-secondary small mt-3">REQUEST INSTALLATION & STOCK CARS PRICES</p>
    </div>

    <!-- Creación del formulario -->
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="enquire-form-container">

          <!-- Acción de Enviar -->
          <form (submit)="onSubmit($event)">

            <!-- Campo Email -->
            <div class="mb-4">
              <label class="mztune-label">EMAIL ADDRESS</label>
              <input type="email" class="mztune-input" placeholder="info@email.com" required>
            </div>

            <!-- Campo Teléfono -->
            <div class="mb-4">
              <label class="mztune-label">PHONE NUMBER</label>
              <input type="tel" class="mztune-input" placeholder="+34 000 000 000" required>
            </div>

            <!-- Campo Vehículo Modelo -->
            <div class="mb-4">
              <label class="mztune-label">VEHICLE MODEL</label>
              <input type="text" class="mztune-input" placeholder="(Optional) Ex. Mazda RX7.">
            </div>

            <!-- Campo Bodykit Modelo -->
            <div class="mb-4">
              <label class="mztune-label">BODYKIT MODEL</label>
              <input type="text" class="mztune-input" placeholder="(Optional) Ex. Veilside Fortune">
            </div>

            <!-- Campo Stock Modelo -->
            <div class="mb-4">
              <label class="mztune-label">STOCK MODEL INTERESTED</label>
              <input type="text" class="mztune-input" placeholder="(Optional) Ex. BMW M3 G80">
            </div>

            <!-- Campo de texto para escribir datos extra -->
            <div class="mb-4">
              <label class="mztune-label">YOUR REQUEST</label>
              <textarea class="mztune-input" rows="8" placeholder="Give us details about your enquire..."></textarea>
            </div>

            <div class="text-center mt-5">

              <!-- Botón enviar -->
              <button type="submit" class="btn-send-enquire">SUBMIT ENQUIRE</button>

              <!-- Slogan -->
              <div class="mt-4">
                <p id="slogan" class="mztune-sponsor">MZ TUNE | KITS AND STOCK ENQUIRES</p>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- --------------------------------------------- -->


<!-- Animación en caso de enviar el formulario -->
@if (mostrarCheck()) {
  <div class="success-overlay">
    <div class="checkmark-wrapper">
      <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
      <p class="fade-in-text">ENQUIRY SENT</p>
    </div>
  </div>
}
