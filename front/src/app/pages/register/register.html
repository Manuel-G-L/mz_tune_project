<!-- FORMULARIO DE REGISTRO -->
<div class="register-wrapper d-flex align-items-center justify-content-center">
  <div class="register-card p-4 mt-5 mb-5">
    <div class="header-section mb-4">
      <h2 class="modal-name">REGISTER</h2>
      <div class="red-line-anim" style="width: 50px;"></div>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="mb-3">
        <label class="brand-label mb-2">USERNAME</label>
        <input type="text" formControlName="username" class="mztune-input" placeholder="Tuner_01">
      </div>
      <div class="mb-3">
        <label class="brand-label mb-2">EMAIL</label>
        <input type="email" formControlName="email" class="mztune-input" placeholder="main@example.com">
      </div>
      <div class="mb-4">
        <label class="brand-label mb-2">PASSWORD</label>
        <input type="password" formControlName="password" class="mztune-input" placeholder="******">
      </div>
      <button type="submit" [disabled]="registerForm.invalid" class="btn-register-mztune w-100">
        CREATE ACCOUNT
      </button>
    </form>
  </div>
</div>
