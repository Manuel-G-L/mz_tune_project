<div class="stock-page">
  <div class="container pt-5">
    <div class="header-section">
      <h1 class="display-5 fw-bold text-white tracking-widest">STOCK CARS</h1>
      <div class="red-line"></div>
      <p class="text-secondary small tracking-widest">EXCLUSIVE JDM & PERFORMANCE INVENTORY</p>
    </div>

    <div class="search-container mt-5">
      <div class="search-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input
          type="text"
          class="mztune-input"
          placeholder="FILTER BY BRAND, MODEL OR SPECS..."
          (input)="s.terminoBusqueda.set(t.value)" #t>
      </div>
    </div>

    <div class="row g-4 mt-4">
      @for (c of s.cochesFiltrados(); track c.ID) {
        <div class="col-12 col-md-6 col-lg-4">
          <div class="car-card">
            <div class="image-box">
              <img [src]="c.imagen" [alt]="c.nombre">
              <div class="price-badge">{{ c.precio }}€</div>
            </div>
            <div class="car-details">
              <span class="brand-label">{{ c.marca }}</span>
              <h3 class="car-title">{{ c.nombre }}</h3>
              <div class="specs-row">
                <span class="spec"><i class="bi bi-speedometer2"></i> {{ c.hp }} CV</span>
                <span class="spec"><i class="bi bi-fuel-pump"></i> AVAILABLE</span>
              </div>
            </div>
          </div>
        </div>
      } @empty {
        <div class="col-12 text-center py-5">
          <p class="text-muted tracking-widest uppercase">No vehicles found matching "{{ s.terminoBusqueda() }}"</p>
        </div>
      }
    </div>
  </div>
</div>
